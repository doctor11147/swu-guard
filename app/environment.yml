name: face
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy=1.26.*
  - opencv=4.10.*
  - pytorch::pytorch=2.3.*
  - pytorch::torchvision=0.18.*
  - timm=1.0.*
  - scikit-image=0.24.*
  - pillow=10.*
  - pip:
      # core inference
      - insightface==0.7.3
      - onnxruntime==1.18.1
      - faiss-cpu==1.8.0
      # web framework
      - fastapi==0.115.0
      - uvicorn==0.30.6
      - websockets==12.0
      - watchfiles>=0.13
      - httptools>=0.6.3
      # uvloop 仅 macOS/Linux 可用（uvicorn 在 Windows 上自动回退 asyncio）
      - python-multipart==0.0.9
      - pydantic==2.9.*
      - pyyaml==6.0.2
      - aiofiles==24.1.0
      # 数据库（升级为 async + MySQL）
      - sqlalchemy[asyncio]==2.0.*
      - asyncmy==0.2.10                # MySQL async 驱动（M1 wheel 直接装）
      - alembic==1.13.3
      # 认证 / 加密
      - passlib[bcrypt]==1.7.4
      - bcrypt<4.1,>=4.0      # passlib 1.7.4 与 bcrypt>=5 API 不兼容
      - python-jose[cryptography]==3.3.0
      # 日志 / 工具
      - loguru==0.7.2
      - python-dotenv==1.0.1
      # 评估脚本用
      - datasets==2.20.0
      # 开发与测试
      - pytest==8.3.3
      - pytest-asyncio==0.24.0
      - httpx==0.27.2
      - ruff==0.6.9
      - mypy==1.11.2
      - types-pyyaml
