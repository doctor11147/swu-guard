[mypy]
python_version = 3.10
ignore_missing_imports = True
check_untyped_defs = True
warn_unused_ignores = False
# Excluded paths (regex). Multi-line via |.
# 排除：upstream 第三方代码 + Alembic migration 模板 + 旧 MVP 单页前端
# + MVP 时期遗留路由（routes_persons.py / routes_recognize.py，待新前端上线后删除，
#   它们仍服务 /persons 与 /recognize 旧契约，类型注解不达 v0.2 标准）
exclude = (^skills/|^edgeface/|^insightface/|^Silent-Face-Anti-Spoofing/|^faiss/|^app/alembic/versions/|^app/frontend/|app/api/routes_persons|app/api/routes_recognize)

# faiss-cpu 是 C 扩展模块，没有类型存根；mypy 对其属性访问无法静态分析
[mypy-faiss]
ignore_errors = True

[mypy-faiss.*]
ignore_errors = True

# 因此调用了 faiss API 的我方文件需局部禁用 attr-defined
[mypy-app.store.faiss_index]
disable_error_code = attr-defined
