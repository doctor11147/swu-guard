<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/swu-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="西小卫 · 西南大学校园人脸识别门禁系统" />
    <meta name="theme-color" content="#003D7A" />
    <title>西小卫</title>
    <style>
      /* 首屏防闪：在 JS 加载前展示骨架，使白屏不那么刺眼 */
      html, body, #app { height: 100%; margin: 0; padding: 0; }
      body { background: #F5F7FA; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
      .splash .ring { width: 48px; height: 48px; border: 3px solid #E3F2FD; border-top-color: #003D7A; border-radius: 50%; animation: rot 0.8s linear infinite; }
      .splash .title { color: #003D7A; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
      .splash .sub   { color: #595959; font-size: 13px; }
      @keyframes rot { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="splash">
        <div class="ring"></div>
        <div class="title">西小卫</div>
        <div class="sub">SWU-Guard</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
